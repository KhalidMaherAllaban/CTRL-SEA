services:
  backend:
    build:
      context: ./ctrl-sea-backend
    env_file:
      - ./ctrl-sea-backend/.env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 4s
      retries: 24
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./ctrl-sea-frontend
      args:
        BACKEND_API_URL: http://backend:8000/api
    environment:
      BACKEND_API_URL: http://backend:8000/api
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 4s
      retries: 12
    restart: unless-stopped
