name: Bug report
description: Report a reproducible problem in CTRL SEA.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve CTRL SEA. Please do not include secrets or private data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Database
        - ArcGIS Map
        - Power BI
        - AI
        - Docker/Deployment
        - Documentation
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Node 22, Python 3.12, SQL Server Express
