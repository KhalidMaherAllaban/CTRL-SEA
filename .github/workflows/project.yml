name: Full Project Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: full-project-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: /api
      BACKEND_API_URL: http://127.0.0.1:8000/api
      NEXT_TELEMETRY_DISABLED: "1"
      ENVIRONMENT: test
      DATABASE_URL: sqlite:///./test.db
      JWT_SECRET: ci-only-placeholder-secret-with-more-than-32-characters
      CORS_ORIGINS: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      POWER_BI_REPORTS_JSON: "[]"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ctrl-sea-frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ctrl-sea-backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: ctrl-sea-frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: ctrl-sea-backend
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install ruff

      - name: Frontend lint
        working-directory: ctrl-sea-frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: ctrl-sea-frontend
        run: npm test

      - name: Frontend TypeScript
        working-directory: ctrl-sea-frontend
        run: npx tsc --noEmit

      - name: Frontend production build
        working-directory: ctrl-sea-frontend
        run: npm run build

      - name: Backend critical lint
        working-directory: ctrl-sea-backend
        run: ruff check app scripts --select E9,F63,F7,F82

      - name: Backend syntax
        working-directory: ctrl-sea-backend
        run: python -m compileall app scripts

      - name: Backend tests
        working-directory: ctrl-sea-backend
        run: |
          rm -f test.db
          python -m pytest -q

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Backend Docker build
        run: docker build -t ctrl-sea-backend:ci ./ctrl-sea-backend

      - name: Frontend Docker build
        run: docker build --build-arg BACKEND_API_URL=http://backend:8000/api -t ctrl-sea-frontend:ci ./ctrl-sea-frontend
