name: Full Project Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ctrl-sea-frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install frontend dependencies
        working-directory: ctrl-sea-frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: ctrl-sea-backend
        run: pip install -r requirements.txt

      - name: TypeScript and ESLint
        working-directory: ctrl-sea-frontend
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Backend syntax
        working-directory: ctrl-sea-backend
        run: python -m compileall app scripts

      - name: Validate Docker Compose config
        run: docker compose config
