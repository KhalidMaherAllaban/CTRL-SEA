name: Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ctrl-sea-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall app scripts

      - name: Tests
        run: python -m pytest -q
        env:
          ENVIRONMENT: test
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET: ci-only-placeholder-secret-with-more-than-32-characters
          CORS_ORIGINS: http://localhost:3000
          FRONTEND_URL: http://localhost:3000
