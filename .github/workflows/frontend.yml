name: Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [22]
    defaults:
      run:
        working-directory: ctrl-sea-frontend
    env:
      NEXT_PUBLIC_API_URL: /api
      BACKEND_API_URL: http://127.0.0.1:8000/api
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ctrl-sea-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Show environment
        run: |
          node --version
          npm --version

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
